server:
  port: 8080

spring:
  application:
    name: issueflow
  datasource:
    url: jdbc:postgresql://localhost:5432/issueflow
    username: issueflow
    password: issueflow
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    time-zone: UTC

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${ISSUEFLOW_JWT_SECRET:change-me-in-production-this-must-be-at-least-32-bytes-long}
    expiration-seconds: 3600
  attachments:
    max-bytes: 10485760
    allowed-mime-types:
      - image/png
      - image/jpeg
      - application/pdf
      - text/plain