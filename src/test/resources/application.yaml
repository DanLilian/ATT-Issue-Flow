spring:
  datasource:
    url: jdbc:h2:mem:issueflow;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: false
  jackson:
    time-zone: UTC

app:
  jwt:
    secret: test-secret-must-be-at-least-32-bytes-long-xxxxxxxxxxxxxx
    expiration-seconds: 3600
  attachments:
    max-bytes: 10485760
    allowed-mime-types:
      - image/png
      - image/jpeg
      - application/pdf
      - text/plain
  issueflow:
    schedule:
      overdue-escalation-cron: "-"
      revoked-token-purge-cron: "-"